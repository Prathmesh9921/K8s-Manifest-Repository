metadata:
   name : demo-job
spec:
   completions : 2
   paralism: 1
   templet:
     metadata:
        name: job-pod
        labels:
          app : batch-task
     spec: 
      containers:
       - name: batch-container
         image: busybox:latest
         command: ["sh" ,"-c" ,"echo hello && sleep 10"]
      restartPolicy: never   

